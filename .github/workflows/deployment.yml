name: Dev Deployment
on: [workflow_dispatch, push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
      - name: Install dependencies
        run: npm ci
      - name: Line
        run: npm run lint 
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Deploy application
        run: echo "Deploying application..."
    